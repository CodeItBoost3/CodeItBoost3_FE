<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link href="/src/index.css" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>조각집</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              lightViolet: "#F4DFFB",
              "lightViolet-hover": "#EBC9F5",
              "lightViolet-active": "#E1B3ED",
              normalViolet: "#DC9FF0",
              "normalViolet-hover": "#CE85E8",
              "normalViolet-active": "#B76CD6",
              darkViolet: "#C75EE9",
              "darkViolet-hover": "#B246D8",
              "darkViolet-active": "#9D33C6",
            },
            boxShadow: {
              card: "2px 4px 12px 0px rgba(0, 0, 0, 0.08)",
              modal: "2px 2px 16px 0px rgba(0, 0, 0, 0.25)",
            },
          },
        },
        plugins: [
          function ({ addUtilities }) {
            addUtilities({
              ".scrollbar-hide": {
                "-ms-overflow-style": "none",
                "scrollbar-width": "none",
              },
              ".scrollbar-hide::-webkit-scrollbar": {
                display: "none",
              },
            });
          },
        ],
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="modal"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
